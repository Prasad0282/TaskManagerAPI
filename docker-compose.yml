services:
  backend:
    build:
      context: ./TaskManagerAPI
      dockerfile: Dockerfile
    ports:
      - "5252:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=app.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
